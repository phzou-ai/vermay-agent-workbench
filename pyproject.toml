[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "mini-agent-workbench"
version = "0.1.0"
description = "A minimal handwritten agent runtime for studying harness mechanics."
requires-python = ">=3.11"
dependencies = ["rich>=13.7"]

[project.scripts]
mini-agent = "mini_agent.main:main"

[tool.setuptools.packages.find]
include = ["mini_agent*"]
